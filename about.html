<!DOCTYPE html>
<html>
<head>
    <title>profile card test</title>
</head>
<body>        
<div class="card">

    <div class="profile-pic"></div>

    <h2> Teo Uchaneishvili </h2>

    <p>Frontend learner 🚀</p>

    <button>Follow</button>

</div>  

<style>

Body {
display: flex;
justify-content: center;
align-items: center;
height: 100vh; 

}  


.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    width: 250px;
} 

.profile-pic {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background-color: #343deb;
    margin: 0 auto;
} 

button {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #34bdeb;
}

button:active {
    transform: scale(0.95);
}
</style>
